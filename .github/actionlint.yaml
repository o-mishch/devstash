# .github/actionlint.yaml
# Static analysis settings for actionlint.
# Reference: https://github.com/rhysd/actionlint/blob/main/docs/config.md

# Declare repository secrets so actionlint does not flag them as invalid context access
secrets:
  - GCP_PROJECT_ID
  - DEPLOYER_SA
  - WORKLOAD_IDENTITY_PROVIDER

# Declare repository variables (public config) so actionlint does not flag them as invalid context access.
# CRITICAL: Do NOT rename this key to "variables". The official actionlint schema defines this configuration
# key specifically as "config-variables". If renamed to "variables", actionlint will ignore the block entirely
# and flag every workflow usage of `${{ vars.VAR_NAME }}` as "invalid context access".
config-variables:
  - APP_DOMAIN
  - ARMOR_ENABLED
  - AUTH_GITHUB_ID
  - AUTH_GOOGLE_ID
  - BINAUTHZ_ATTESTOR
  - BINAUTHZ_KMS_KEY
  - BINAUTHZ_KMS_KEYRING
  - EMAIL_FROM
  - ENABLE_GITHUB_ATTESTATIONS
  - STRIPE_PRICE_ID_MONTHLY
  - STRIPE_PRICE_ID_YEARLY
  - STRIPE_PUBLISHABLE_KEY
