# PR-level infra shell gate. Runs the SAME static analysis + tests the maintainer runs by hand
# (shellcheck over the infra shell scripts, plus the bats test suite), but on PULL REQUESTS so a
# regression in the run.sh/suspend.sh orchestration — a reintroduced empty-body `gh secret set`
# hang, a lost outputs-present gate, a broken state-lock recovery, or any new shellcheck error — is
# caught BEFORE it reaches main. Mirrors migration-safety.yml: paths-scoped, fork-safe, no-cloud-auth.
# Make this a REQUIRED status check in branch protection for main.
#
# SECURITY: PRs from forks run untrusted code, so this job is minimal — contents: read only, NO
# id-token / cloud auth (nothing here needs GCP; the bats tests stub `gcloud`/`tofu`/`gh` on PATH),
# and persist-credentials: false. shellcheck runs at ERROR severity: the infra scripts carry a few
# long-standing warning-level false positives (SC2034 sourced vars, SC2178 local-var reuse), so
# gating on errors keeps the check meaningful without pinning the whole tree to a clean-warning bar.
name: infra-checks

on:
  pull_request:
    branches: [main]
    # Only gate PRs that touch infra shell — run.sh/suspend.sh orchestration, the CI scripts, the
    # POSIX libs, or the bats tests themselves. Other PRs skip this workflow entirely.
    paths:
      - "infra/**/*.sh"
      - "infra/**/*.bats"
      - "infra/**/*.bash"
      - "infra/**/__fixtures__/**"
      - ".github/workflows/infra-checks.yml"

permissions:
  contents: read

concurrency:
  group: infra-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # shellcheck + jq + python3 are preinstalled on ubuntu-latest runners; no setup step needed.
      - name: Shellcheck infra scripts (error severity)
        run: infra/ci/shellcheck-infra.sh
      # bats is an npm devDependency, so provision Node + install it (the bats CLI + bats-mock/
      # support/assert helpers the tests load from node_modules). --ignore-scripts skips the
      # prisma-generate postinstall (irrelevant to the shell tests, needs no DB).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install bats toolchain
        run: npm ci --ignore-scripts
      # GNU `parallel` lets infra/ci/run-bats.sh split the suite across files (~3x faster). It is
      # preinstalled on ubuntu-latest today, but installing it explicitly keeps the speedup from
      # silently regressing to serial if the runner image ever drops it. Idempotent + no-op if present.
      - name: Ensure GNU parallel (for parallel bats)
        run: command -v parallel >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y parallel; }
      # The bats suite stubs gcloud/tofu/gh/pgrep on PATH — reproduces the empty-state secrets bug,
      # the pre-dispatch gate, state-lock recovery, and the POSIX suspend helpers. Self-contained:
      # no cloud auth. run-bats.sh parallelises across files when `parallel` is present (it is, above).
      - name: Infra shell tests (bats)
        run: npm run test:infra
