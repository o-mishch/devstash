# PR-level infra gate for the devstash-infra Python CLI. Runs the SAME strict tool suite the
# maintainer runs by hand (ruff format+lint, mypy & basedpyright strict, pytest argv-parity, uv
# supply-chain audit) on PULL REQUESTS, so a regression in the devstash-infra gcp/ci orchestration —
# now the CLI's gcp/ci/local orchestrators — is caught BEFORE it reaches main. A tiny shellcheck job
# covers the only shell that survives the cutover: the Cloud Build auto-suspend shims. Mirrors
# migration-safety.yml: paths-scoped, fork-safe, no-cloud-auth.
# Make this a REQUIRED status check in branch protection for main.
#
# SECURITY: PRs from forks run untrusted code, so this stays minimal — contents: read only, NO
# id-token / cloud auth (the argv-parity tests fake subprocess, they never touch GCP), and
# persist-credentials: false. The floor-drift guard (needs docker to pull the pinned image) is NOT
# run here to keep the gate fork-safe + fast; it belongs on the deploy/scheduled path.
name: infra-checks

on:
  pull_request:
    branches: [main]
    # Gate PRs that touch the CLI package, the surviving shims, the committed inputs the CLI reads
    # at runtime (a bad docker-bake.hcl / versions.env / gcp overlay / pgfence policy would otherwise
    # skip this strict gate and only surface at deploy time — or not at all), or this workflow.
    paths:
      - "infra/cli/**"
      - "infra/terraform/envs/dev/scripts/*.sh"
      - "infra/data/**"
      - "infra/versions.env"
      - "infra/k8s/overlays/gcp/**"
      - ".pgfence.json"
      - ".github/workflows/infra-checks.yml"

permissions:
  contents: read

concurrency:
  group: infra-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra/cli
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # uv reads infra/cli/.python-version and provisions the pinned interpreter; --frozen installs
      # exactly uv.lock (reproducible, fails on drift). enable-cache reuses the wheel cache across PRs.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Format (ruff)
        run: uv run ruff format --check
      - name: Lint (ruff)
        run: uv run ruff check
      - name: Types (mypy strict)
        run: uv run mypy
      - name: Types (basedpyright strict)
        run: uv run basedpyright
      - name: Tests (pytest, argv-parity)
        run: uv run pytest
      - name: Supply-chain audit (uv)
        run: uv audit --preview-features audit-command

  shellcheck-shims:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # shellcheck is preinstalled on ubuntu-latest. The only shell left after the cutover is the
      # thin Cloud Build shims (POSIX sh) under the dev env's scripts/ dir.
      - name: Shellcheck surviving shell (error severity)
        run: shellcheck --severity=error infra/terraform/envs/dev/scripts/*.sh
