# Go backend CI. Lints (golangci-lint v2, matching backend/.golangci.yml) and tests the
# backend/ Go module on every PR that touches it, plus on pushes to main. Scoped to backend/**
# so unrelated PRs skip it entirely.
#
# SECURITY: contents: read only, no cloud auth (nothing here needs GCP), persist-credentials: false.
name: backend-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      # -covermode=atomic is required alongside -race; -coverpkg=./... credits
      # handler/integration tests for the packages they exercise (not just their own).
      - name: Test
        run: go test -race -covermode=atomic -coverpkg=./... -coverprofile=cover.out ./...

      # Hard-fails below the thresholds in backend/.testcoverage.yml (total 70%, internal/auth 85%).
      # Runs from repo root (uses: actions ignore defaults.run.working-directory), so the config's
      # `profile:` points at backend/cover.out.
      - name: Check coverage
        uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2.18.8
        with:
          config: ./backend/.testcoverage.yml
          # source-dir points the tool at the module root so paths stripped via
          # local-prefix resolve to real files; the action runs from repo root,
          # but the Go module lives in backend/.
          source-dir: backend

      # Single source of truth for the linter version: read it from the pinned
      # golangci-lint/go.mod (the same module `task backend:lint` runs via
      # `go tool -modfile=`), so the workflow can never drift from the local pin.
      - name: Resolve golangci-lint version
        id: gcl
        run: echo "version=$(go list -m -modfile=golangci-lint/go.mod -f '{{.Version}}' github.com/golangci/golangci-lint/v2)" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128 # v8.0.0
        with:
          version: ${{ steps.gcl.outputs.version }}
          working-directory: backend

      # Formatter check (gofumpt + goimports + golines) — the action only runs the
      # linters, so without this a formatting drift would merge unnoticed. Uses the
      # binary the action just put on PATH.
      - name: Format check
        run: golangci-lint fmt --diff

      # Known-vulnerability scan. govulncheck is pinned in the isolated tools/go.mod
      # (same `go tool -modfile=` pattern as air/sqlc), so CI and `task backend:vuln`
      # can never drift on the tool version.
      - name: govulncheck
        run: go tool -modfile=tools/go.mod govulncheck ./...
