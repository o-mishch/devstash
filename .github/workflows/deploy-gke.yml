# CI/CD: build → push → deploy DevStash to GKE.
# See infra/docs/04-cicd.md for the full walkthrough.
#
# Auth uses Workload Identity Federation (keyless) — GitHub's OIDC token is
# exchanged for short-lived GCP credentials. No long-lived service-account JSON
# key is ever stored in GitHub secrets.
name: deploy-gke

on:
  push:
    branches: [main]
  # Manual runs are allowed, but Workload Identity Federation pins the OIDC token to
  # refs/heads/main (iam module attribute_condition) — so a manual dispatch only
  # authenticates to GCP when run from the `main` branch. Dispatching another branch
  # fails at the auth step by design.
  workflow_dispatch: {}

# Serialize deployments but never cancel one already mutating external state. GitHub
# cancellation does not stop an in-cluster migration Job; a newer run could then delete
# that still-running Job and interrupt a schema change. `false` lets the active deploy
# finish while GitHub keeps only the newest pending run for this group.
concurrency:
  group: deploy-gke-${{ github.ref }}
  cancel-in-progress: false

env:
  # us-central1 is one of the three GCS Always Free regions (with us-west1/us-east1).
  # Other US regions and the "US" multi-region do not qualify. Must match `region`
  # in infra/terraform/envs/dev/terraform.tfvars.
  REGION: us-central1
  # CLUSTER = "${name_prefix}-gke" = "devstash-${var.environment}-gke" = "devstash-dev-gke"
  # (Terraform: locals.tf name_prefix + modules/gke/main.tf resource name suffix).
  # Must stay in sync with the Terraform GKE module — if environment or the module
  # name template ever changes, update this value.
  CLUSTER: devstash-dev-gke
  REPO: devstash # Artifact Registry repository id (modules/artifact-registry/main.tf)
  IMAGE: web # runtime image (default last Dockerfile stage)
  IMAGE_MIGRATE: migrate # migrator image (Dockerfile --target migrator)

# Default: read-only for all jobs. id-token + attestations are scoped to
# build-deploy only — granting them workflow-wide would expose the GCP OIDC
# token to the `verify` job where untrusted test code runs.
permissions:
  contents: read

jobs:
  # ---- Gate: lint + tests must pass before we build/deploy anything ----------
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Lint the extracted deploy scripts (infra/ci/*.sh) + the shared bash library
      # (infra/lib/*.sh) as real shell — the whole point of pulling them out of this YAML.
      # shellcheck is preinstalled on ubuntu-latest. -x follows `source infra/versions.env`
      # and `source infra/lib/common.sh`; -e SC1091 belt-and-braces in case the runner image
      # ever drops a sourced file from the checkout. Scope excludes
      # infra/terraform/envs/dev/scripts/*.sh — those are Cloud Build substitution templates
      # ($$/$_VAR syntax), NOT plain bash, and must not be linted here.
      - name: Lint deploy scripts (shellcheck)
        run: shellcheck -x -e SC1091 infra/ci/*.sh infra/lib/*.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Single source of truth: read the pinned Node version from .nvmrc (currently
          # Node 24 Active LTS) so CI, local dev (nvm), and the Docker base never drift.
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Static safety analysis of every pending migration SQL file before anything is
      # built or deployed — blocks dangerous statements (DROP COLUMN, lock-heavy ALTER,
      # non-CONCURRENT index, renames). Full rationale + the globstar note live in the
      # script; policy is the committed .pgfence.json.
      - name: Check migration safety
        run: infra/ci/check-migrations.sh
      - run: npm run lint
      - run: npm run test:run

  # ---- Preflight: skip cleanly if the environment is suspended ---------------
  # A merge to main while the showcase is parked at ~$0 (deep-suspended: no GKE cluster,
  # Artifact Registry images purged) must NOT rebuild/repush images and must NOT fail — it
  # should skip with a warning. This job checks whether the cluster exists and publishes
  # `suspended`; build-deploy self-skips when it is true, so build-push never runs (the
  # purged images stay purged) and no step errors against a missing cluster. Resume is
  # unaffected: run.sh resume recreates the cluster BEFORE dispatching this workflow, so by
  # the time preflight runs the environment is active again.
  preflight:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation: OIDC token for the cluster existence check
    outputs:
      suspended: ${{ steps.env-state.outputs.suspended }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Detect suspended environment
        id: env-state
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: infra/ci/check-env-active.sh

  # ---- Build the image, push to Artifact Registry, deploy to GKE -------------
  build-deploy:
    needs: preflight # runs after verify (transitively) + the suspended check
    # Two guards. (1) GCP Workload Identity Federation pins the OIDC token to refs/heads/main
    # (iam module attribute_condition: assertion.ref == "refs/heads/main"); a workflow_dispatch
    # on any other branch would reach google-github-actions/auth and fail with a cryptic
    # "unauthorized_client" GCP STS error, so gate on main here to surface the real reason.
    # (2) Skip entirely when preflight found the environment suspended — no rebuild/repush, no
    # failure against a missing cluster (the job shows as skipped, with preflight's warning).
    if: github.ref == 'refs/heads/main' && needs.preflight.outputs.suspended != 'true'
    runs-on: ubuntu-latest
    # GCP_PROJECT_ID is consumed by four steps (validate, build-push, sign-images,
    # inject-settings) — declare it once at job scope instead of in each step's env. Scoped
    # to this job (not workflow-level) so it is never exposed to the `verify` job, which runs
    # untrusted test code — the same trust boundary that keeps id-token off `verify`.
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    # Hard cap beyond per-step timeouts. Worst-case declared budgets are image build
    # 10m + two Helm upgrades 10m + migration 10m + rollout 5m, before API/setup
    # overhead. 30m did not cover its own stated path and could cancel a live migration
    # Job. 45m provides a real buffer while avoiding the runner's six-hour default.
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write     # Workload Identity Federation: request OIDC token
      attestations: write # SLSA provenance attestation push
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate deployment inputs
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SA: ${{ secrets.DEPLOYER_SA }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          BINAUTHZ_ATTESTOR: ${{ vars.BINAUTHZ_ATTESTOR }}
          BINAUTHZ_KMS_KEYRING: ${{ vars.BINAUTHZ_KMS_KEYRING }}
          BINAUTHZ_KMS_KEY: ${{ vars.BINAUTHZ_KMS_KEY }}
        run: infra/ci/validate-inputs.sh

      # Keyless auth to GCP. WORKLOAD_IDENTITY_PROVIDER + DEPLOYER_SA are repo
      # variables/secrets; the provider is created in Terraform (iam module +
      # a WIF pool). No JSON key.
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Export ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN / ACTIONS_RESULTS_URL into the
      # environment so the plain `run:` build below can use buildx `type=gha` cache
      # (docker/build-push-action injects these automatically; a raw script cannot).
      # This keeps the ~900 MB/image mode=max build cache in GitHub's cache instead of
      # Artifact Registry, so GAR storage stays inside the 0.5 GB free tier.
      - name: Expose GitHub Actions runtime for buildx gha cache
        uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.0.0

      - name: Build & push images
        id: build-push
        run: infra/ci/build-push.sh

      # Binary Authorization attestations (KMS-backed attestor, see modules/gke/main.tf).
      # This is the CI half of "step 2" in that module's enforcement-path comment: sign
      # every deployed digest so attestations are proven to land BEFORE the cluster rule
      # is ever switched from ALWAYS_ALLOW to REQUIRE_ATTESTATION. Hard-fails the build on
      # error — enforcement is off, so a signing failure cannot brick a live deploy, but a
      # silent failure here would hide a broken pipeline from whoever eventually flips
      # enforcement on. KMS does the signing; no private key ever touches the runner.
      # Skipped when Binary Authorization is disabled (binauthz_enabled=false → the
      # attestor/KMS resources are not provisioned and BINAUTHZ_ATTESTOR is unset). The
      # validate step above guarantees the three vars are all-set-or-all-unset, so gating
      # on the attestor alone is sufficient.
      - name: Sign images for Binary Authorization
        if: vars.BINAUTHZ_ATTESTOR != ''
        env:
          BINAUTHZ_ATTESTOR: ${{ vars.BINAUTHZ_ATTESTOR }}
          BINAUTHZ_KMS_KEYRING: ${{ vars.BINAUTHZ_KMS_KEYRING }}
          BINAUTHZ_KMS_KEY: ${{ vars.BINAUTHZ_KMS_KEY }}
        run: infra/ci/sign-images.sh

      # Optional GitHub/Sigstore provenance. Private repositories require GitHub
      # Enterprise Cloud for artifact attestations; leave the repository variable
      # ENABLE_GITHUB_ATTESTATIONS unset/false otherwise so a plan limitation cannot
      # block deployment. These are verified with `gh attestation verify`; they do
      # NOT satisfy GKE Binary Authorization REQUIRE_ATTESTATION.
      - name: Attest web image
        if: vars.ENABLE_GITHUB_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.build-push.outputs.web_image_name }}
          subject-digest: ${{ steps.build-push.outputs.web_digest }}
          push-to-registry: true

      - name: Attest migrate image
        if: vars.ENABLE_GITHUB_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.build-push.outputs.migrate_image_name }}
          subject-digest: ${{ steps.build-push.outputs.migrate_digest }}
          push-to-registry: true

      # Vulnerability scan (warn-only). Trivy scans the freshly built images inside the
      # runner — no dependency on Google Artifact Analysis, which is billable (~$0.26/image
      # on first scan) and async (the old gcloud-poll approach wasted ~10 min per deploy and
      # never actually inspected an image because on-push scanning was never enabled).
      # containerscanning.googleapis.com is intentionally left DISABLED to keep the dev env
      # at $0 idle cost. Findings print to the job log for visibility but never block the
      # deploy (exit-code: '0'); flip exit-code to '1' to make this a hard gate. Time-bound
      # exceptions live in infra/security/.trivyignore.yaml. Docker is already authenticated
      # to Artifact Registry from the build-push step, so Trivy pulls the images by digest.
      - name: Scan web image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}@${{ env.WEB_DIGEST }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '0'
          trivyignores: infra/security/.trivyignore.yaml

      - name: Scan migrate image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.MIGRATE_IMAGE }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '0'
          trivyignores: infra/security/.trivyignore.yaml

      # The control plane has no public IP endpoint (enable_private_endpoint = true);
      # access is via the IAM-gated DNS-based endpoint, so request DNS-based creds.
      #
      # This step reads the cluster over the always-on regional container.googleapis.com
      # API, so it SUCCEEDS even when the DNS endpoint refuses the request. If this
      # step is green but the first helm/kubectl step below dies with
      # "Kubernetes cluster unreachable: ... Error 403 (Forbidden)!!1 ... That's an error",
      # that generic Google HTML page is the DNS endpoint's Front End refusing the request.
      # CONFIRMED CAUSE (commit a051ad7): an IAM Condition on the deployer's container role
      # pinned resource.name to the cluster path, which the DNS endpoint cannot satisfy for
      # container.clusters.connect. Also confirm allow_external_traffic is applied on the live
      # cluster (a separate prerequisite) — see infra/terraform/modules/{iam,gke}/main.tf.
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
          use_dns_based_endpoint: true

      # Preflight: prove the control plane is actually reachable over the DNS endpoint
      # BEFORE the build spends time on Helm. The creds step above can be green while the
      # DNS endpoint refuses this runner's request — historically caused by an IAM Condition
      # on the deployer role (removed in a051ad7), and also possible if allow_external_traffic
      # drifts off. Helm surfaces either as a cryptic "Kubernetes cluster unreachable: <html>
      # 403" that reads like a Helm/chart fault. This probe hits the API server's /readyz path;
      # a generic 403 HTML page means a Google-Front-End rejection, which we detect and
      # translate into the two gates to check instead of a misleading downstream error.
      - name: Verify control plane reachable (DNS endpoint)
        run: infra/ci/verify-control-plane.sh

      # Inject the real per-environment values into the overlay's single
      # source of truth (settings.yaml). Kustomize `replacements` fan these
      # out into the Workload-Identity SA annotation, ManagedCertificate domain,
      # NEXTAUTH_URL, and Ingress static-IP name. The image is separate because its
      # digest is build output, not environment config: CI pins `images` directly to
      # THIS build's repo + immutable registry digest (not :latest),
      # so the rendered Deployment is reproducible and the migrate→rollout gate
      # below is real. `yq` is preinstalled on ubuntu-latest runners.
      - name: Inject environment values
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # Non-secret app config promoted out of Secret Manager. OPTIONAL GitHub Actions
          # repo vars: if unset they fall back to the committed settings.yaml value (see the
          # `env(X) // .data.field` yq below), so a fresh checkout deploys correctly without
          # them. Set them only to override the committed default per-environment.
          AUTH_GITHUB_ID: ${{ vars.AUTH_GITHUB_ID }}
          AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PRICE_ID_MONTHLY: ${{ vars.STRIPE_PRICE_ID_MONTHLY }}
          STRIPE_PRICE_ID_YEARLY: ${{ vars.STRIPE_PRICE_ID_YEARLY }}
          # "true" attaches the Cloud Armor policy; unset (dev $0 default) → no edge WAF.
          # run.sh set-repo-secrets sets/clears this from the Terraform armor_enabled state.
          ARMOR_ENABLED: ${{ vars.ARMOR_ENABLED }}
        run: infra/ci/inject-settings.sh

      # The overlay ships an ESO SecretStore + ExternalSecret (Secret Manager →
      # devstash-secrets). Their CRDs must exist before `apply -k`. Install/upgrade
      # ESO idempotently — a no-op on clusters that already have it.
      # --version is read from infra/versions.env (single source of truth shared with run.sh).
      # Update the version there to bump both CI and the bootstrap script together.
      - name: Ensure External Secrets Operator
        run: infra/ci/ensure-eso.sh

      # Stakater Reloader: watches Secrets/ConfigMaps and rolls Deployments when
      # their data changes. Required for secret.reloader.stakater.com/reload
      # annotations (set on the web Deployment) to take effect — without Reloader
      # the annotation is inert and ESO-refreshed secrets only propagate on the
      # next manual deploy. --version is read from infra/versions.env.
      - name: Ensure Stakater Reloader
        run: infra/ci/ensure-reloader.sh

      # Render the overlay ONCE to /tmp/rendered.yaml; the infra apply and the
      # post-migration rollout below both consume that same render (real migrate→rollout
      # gate, not the old :latest race). See infra/ci/render-manifests.sh.
      - name: Render manifests
        run: infra/ci/render-manifests.sh

      # Apply everything EXCEPT the web Deployment (server-side, --force-conflicts) so
      # existing pods keep the previous image until the post-migration rollout. The full
      # rationale — why --force-conflicts is required and safe (the one-time CSA→SSA
      # ownership transfer) — lives in infra/ci/apply-infra.sh.
      - name: Apply infra (everything except the web Deployment)
        run: infra/ci/apply-infra.sh

      - name: Wait for secrets to sync (ESO)
        # devstash-secrets is materialized by External Secrets Operator from
        # Secret Manager. Both the migrate Job and the web pods need it, so block
        # until the ExternalSecret reports Ready before running anything against
        # the database.
        run: kubectl -n devstash wait --for=condition=Ready externalsecret/devstash-secrets --timeout=180s

      - name: Run DB migrations + seed item types (gated)
        run: infra/ci/run-migrations.sh

      # Migrations have landed — apply the digest-pinned web Deployment from the same
      # render to trigger the rolling update. Same SSA/--force-conflicts posture as the
      # infra apply; see infra/ci/rollout-web.sh.
      - name: Roll out the web Deployment (post-migration)
        run: infra/ci/rollout-web.sh

      - name: Wait for rollout
        run: infra/ci/wait-rollout.sh
