# CI/CD: build → push → deploy DevStash to GKE.
# See infra/docs/04-cicd.md for the full walkthrough.
#
# Auth uses Workload Identity Federation (keyless) — GitHub's OIDC token is
# exchanged for short-lived GCP credentials. No long-lived service-account JSON
# key is ever stored in GitHub secrets.
name: deploy-gke

on:
  push:
    branches: [main]
  # Manual runs are allowed, but Workload Identity Federation pins the OIDC token to
  # refs/heads/main (iam module attribute_condition) — so a manual dispatch only
  # authenticates to GCP when run from the `main` branch. Dispatching another branch
  # fails at the auth step by design.
  workflow_dispatch:
    inputs:
      # Intent signal set by run.sh resume/up when it PRE-DISPATCHES this workflow to
      # overlap the image build with `apply` (the cluster does not exist yet at dispatch).
      # The `gate` job below uses it to decide whether to build even though no cluster is
      # visible: a deliberate provision → build; a plain push while the env is parked at ~$0
      # (no input, no cluster) → skip the whole build+deploy so no images are wastefully
      # repushed only to be purged by the next suspend. Default "" = "not a provision".
      reason:
        description: 'Set to "provision" when run.sh is bringing the environment up/back (build even before the cluster exists).'
        required: false
        default: ''

# Serialize deployments but never cancel one — a newer run must QUEUE behind the active one, not
# evict it. GitHub cancellation does not stop an in-cluster migration Job; a newer run could then
# delete that still-running Job and interrupt a schema change.
#
# `queue: max` (GitHub, 2026-05) queues pending runs FIFO instead of the default "keep only the
# newest pending, cancel the rest". This fixes the exact eviction we hit live: run.sh resume/up
# PRE-DISPATCH this workflow (reason=provision) so its build overlaps `apply`, and that build sits
# for minutes in build-push.sh's AR-writable gate while the repo/binding are recreated. Under the
# default policy an ordinary push to main landing during a resume found the pre-dispatched build
# still PENDING and cancelled it (observed: cancelled at AR attempt 24/40 by a push 4 min later),
# leaving infra up with no image pushed. With `queue: max` the push simply queues behind the
# provision run instead — no clever per-run group key needed. Cannot be combined with
# cancel-in-progress: true (conflicting semantics), which is fine — we never want to cancel here.
concurrency:
  group: deploy-gke-${{ github.ref }}
  queue: max

env:
  # us-central1 is one of the three GCS Always Free regions (with us-west1/us-east1).
  # Other US regions and the "US" multi-region do not qualify. Must match `region`
  # in infra/terraform/envs/dev/terraform.tfvars.
  REGION: us-central1
  # CLUSTER = "${name_prefix}-gke" = "devstash-${var.environment}-gke" = "devstash-dev-gke"
  # (Terraform: locals.tf name_prefix + modules/gke/main.tf resource name suffix).
  # Must stay in sync with the Terraform GKE module — if environment or the module
  # name template ever changes, update this value.
  CLUSTER: devstash-dev-gke
  REPO: devstash # Artifact Registry repository id (modules/artifact-registry/main.tf)
  IMAGE: web # runtime image (default last Dockerfile stage)
  IMAGE_MIGRATE: migrate # migrator image (Dockerfile --target migrator)
  NO_UPDATE_NOTIFIER: true # silence npm update notifications in CI steps

# Default: read-only for all jobs. id-token + attestations are scoped to
# build-deploy only — granting them workflow-wide would expose the GCP OIDC
# token to the `verify` job where untrusted test code runs.
permissions:
  contents: read

jobs:
  # ---- Gate: lint + tests must pass before we build/deploy anything ----------
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Lint the extracted deploy scripts (infra/ci/*.sh) + the shared bash library
      # (infra/lib/*.sh) as real shell — the whole point of pulling them out of this YAML.
      # shellcheck is preinstalled on ubuntu-latest. -x follows `source infra/versions.env`
      # and `source infra/lib/common.sh`; -e SC1091 belt-and-braces in case the runner image
      # ever drops a sourced file from the checkout. Scope excludes
      # infra/terraform/envs/dev/scripts/*.sh — those are Cloud Build substitution templates
      # ($$/$_VAR syntax), NOT plain bash, and must not be linted here.
      - name: Lint deploy scripts (shellcheck)
        run: shellcheck -x -e SC1091 infra/ci/*.sh infra/lib/*.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Single source of truth: read the pinned Node version from .nvmrc (currently
          # Node 24 Active LTS) so CI, local dev (nvm), and the Docker base never drift.
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Static safety analysis of every pending migration SQL file before anything is
      # built or deployed — blocks dangerous statements (DROP COLUMN, lock-heavy ALTER,
      # non-CONCURRENT index, renames). Full rationale + the globstar note live in the
      # script; policy is the committed .pgfence.json.
      - name: Check migration safety
        run: infra/ci/check-migrations.sh
      - run: npm run lint
      - run: npm run test:run

  # ---- Gate: decide whether to BUILD at all (avoid wasteful repushes) ---------
  # The image build must run when the env is active (normal push) OR when run.sh is bringing
  # it up/back (pre-dispatch, cluster not created yet). It must NOT run on a plain push to
  # main while the env is parked at ~$0 — that would rebuild + repush images the very next
  # suspend purges, for nothing. A live cluster check alone can't tell "parked" from
  # "resume in flight" (cluster absent in both), so combine two cheap signals:
  #   • reason == 'provision'  — run.sh set this because it IS provisioning (build wanted), or
  #   • the GKE cluster already exists — the env is active (normal push, build wanted).
  # Neither → parked env, skip the build. This is a ONE-SHOT check (not the poll preflight
  # does): it only needs the state at dispatch, and the provision input covers the resume race
  # so no waiting is required here. Cheap: auth + a single clusters-list, no build tools.
  gate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF OIDC token for the cluster existence check
    # On auth success `decide-active` writes build; on auth failure `decide` (the torn-down
    # skip) writes build=false. Exactly one runs, so || picks the one that did.
    outputs:
      build: ${{ steps.decide-active.outputs.build || steps.decide.outputs.build }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # continue-on-error: a torn-down WIF pool (full `run.sh down`) makes this fail with a
      # cryptic STS `invalid_target`. Rather than let that be the whole workflow's red failure,
      # tolerate it here and branch below: CI cannot self-heal a deleted pool (undeleting it
      # needs GCP auth, which needs the pool), so the correct behavior is a warned clean skip,
      # not a hard error. This is the ONE gate that needs it — build-push/preflight/deploy all
      # cascade off gate.outputs.build, so guarding auth here short-circuits the rest.
      - id: auth
        continue-on-error: true
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}
      # WIF pool torn down → warn loudly + set build=false (skips build-push/preflight/deploy).
      # Runs ONLY on auth failure; owns the `decide` step id so gate.outputs.build resolves to
      # 'false' via the same output the success path writes.
      - name: Skip cleanly if WIF is torn down
        id: decide
        if: steps.auth.outcome == 'failure'
        run: infra/ci/wif-torn-down-skip.sh
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        if: steps.auth.outcome == 'success'
      - name: Decide whether to build
        id: decide-active
        if: steps.auth.outcome == 'success'
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          # github.event.inputs.reason is '' on a push event (only set via workflow_dispatch).
          DISPATCH_REASON: ${{ github.event.inputs.reason }}
        run: infra/ci/decide-build.sh

  # ---- Preflight: skip the DEPLOY cleanly if the environment is suspended -----
  # A merge to main while the showcase is parked at ~$0 (deep-suspended: no GKE cluster)
  # must NOT deploy — the `deploy` job self-skips when this publishes suspended=true, so no
  # step errors against a missing cluster.
  #
  # WHY `needs: [build-push]` + a POLLING check (not a one-shot): run.sh resume/up now
  # PRE-DISPATCH this workflow so the cluster-independent build-push job overlaps `apply`
  # (Cloud SQL ~10 min). At dispatch time the cluster does not exist yet, so a one-shot
  # existence check here would wrongly report suspended=true and permanently skip the deploy
  # even though apply is actively creating the cluster. Depending on build-push defers this
  # check until AFTER the build (giving apply a head start), and check-env-active.sh then
  # POLLS for the cluster for a bounded window: a resume/up in flight resolves to active once
  # the control plane appears; a genuinely parked env still resolves to suspended after the
  # timeout and skips cleanly. On a plain push to a parked env the `gate` job already skipped
  # build-push, so this preflight is skipped too (needs build-push) — no wasted poll there.
  preflight:
    if: github.ref == 'refs/heads/main'
    needs: [build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation: OIDC token for the cluster existence check
    outputs:
      suspended: ${{ steps.env-state.outputs.suspended }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Detect suspended environment
        id: env-state
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: infra/ci/check-env-active.sh

  # ---- Build the images + push to Artifact Registry (NO cluster dependency) ---
  # Split out of the old single build-deploy job so the image build can run WHILE the
  # infra (Cloud SQL ~10 min, GKE control plane ~5-7 min) is still provisioning. This job
  # needs only `verify` — NOT `preflight` — because Artifact Registry exists early and
  # ungated (it is recreated before anything else on resume), so build+push has no reason
  # to wait on the cluster. `run.sh resume`/`up` pre-dispatch this workflow so this job
  # overlaps the Terraform apply; the cluster-gated `deploy` job below then consumes the
  # digests this job emits. The `gate` job decides whether to build at all — on a plain push
  # to a PARKED env gate says build=false and this job (plus preflight+deploy) skip cleanly,
  # so no images are wastefully rebuilt/repushed only to be purged by the next suspend.
  build-push:
    # verify = lint/test must pass; gate = the build/skip decision. Deliberately NOT
    # `preflight` — the whole point is that this runs before the cluster exists (preflight
    # depends on THIS job). gate.outputs.build=='true' means the env is active or a run.sh
    # provision is in flight; on a plain push to a parked env gate says 'false' and this whole
    # job (and its dependents preflight+deploy) skip cleanly — no wasteful build/repush.
    needs: [verify, gate]
    # GCP Workload Identity Federation pins the OIDC token to refs/heads/main (iam module
    # attribute_condition: assertion.ref == "refs/heads/main"); a workflow_dispatch on any
    # other branch would reach google-github-actions/auth and fail with a cryptic
    # "unauthorized_client" GCP STS error, so gate on main here to surface the real reason.
    if: github.ref == 'refs/heads/main' && needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    # GCP_PROJECT_ID is consumed by the build-push + sign steps — declare it once at job
    # scope. Scoped to this job (not workflow-level) so it is never exposed to the `verify`
    # job, which runs untrusted test code — the same trust boundary that keeps id-token off
    # `verify`.
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    # The image build's own budget (docker buildx bake ~90-105s warm, 278s cold GHA cache;
    # the step wraps its own 8m retry). 15m caps setup + auth + build + sign with headroom,
    # well under the runner's six-hour default. The cluster-side work (Helm/migrate/rollout)
    # has moved to the `deploy` job, which carries its own longer cap.
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write     # Workload Identity Federation: request OIDC token
      attestations: write # SLSA provenance attestation push
    # Hand the immutable registry digests to the cluster-gated `deploy` job. build-push.sh
    # already writes these to $GITHUB_OUTPUT (step id: build-push); surface them as JOB
    # outputs so they cross the job boundary. deploy reconstructs the same env var names from
    # these so every downstream script (inject-settings/sign/run-migrations/prune/trivy) reads
    # them unchanged.
    outputs:
      image_uri:      ${{ steps.build-push.outputs.web_image_name }}
      web_digest:     ${{ steps.build-push.outputs.web_digest }}
      migrate_image:  ${{ steps.build-push.outputs.migrate_image_name }}
      migrate_digest: ${{ steps.build-push.outputs.migrate_digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate deployment inputs
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SA: ${{ secrets.DEPLOYER_SA }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          BINAUTHZ_ATTESTOR: ${{ vars.BINAUTHZ_ATTESTOR }}
          BINAUTHZ_KMS_KEYRING: ${{ vars.BINAUTHZ_KMS_KEYRING }}
          BINAUTHZ_KMS_KEY: ${{ vars.BINAUTHZ_KMS_KEY }}
        run: infra/ci/validate-inputs.sh

      # Keyless auth to GCP. WORKLOAD_IDENTITY_PROVIDER + DEPLOYER_SA are repo
      # variables/secrets; the provider is created in Terraform (iam module +
      # a WIF pool). No JSON key.
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Export ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN / ACTIONS_RESULTS_URL into the
      # environment so the plain `run:` build below can use buildx `type=gha` cache
      # (docker/build-push-action injects these automatically; a raw script cannot).
      # This keeps the ~900 MB/image mode=max build cache in GitHub's cache instead of
      # Artifact Registry, so GAR storage stays inside the 0.5 GB free tier.
      - name: Expose GitHub Actions runtime for buildx gha cache
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      # Wrapped in a retry: the build+push (docker buildx bake) has hung in practice
      # (GHA cache backend / registry-push flakiness) well past its normal ~90-105s
      # runtime, with no per-step signal until the whole job's 45m cap fired. 8m is
      # ~4.5x the worst observed successful run (278s, cold GHA cache) — enough
      # headroom to never false-positive on a legitimately slow cache-miss build, tight
      # enough to fail fast on a genuine hang. 2 attempts self-heals a one-off flake
      # without a human re-running `deploy`. build-push.sh's GITHUB_OUTPUT/GITHUB_ENV
      # writes still land in the real files — the wrapper spawns the command inheriting
      # this process's environment, it does not sandbox or discard them.
      - name: Build & push images
        id: build-push
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_on: any
          command: infra/ci/build-push.sh

      # Binary Authorization attestations (KMS-backed attestor, see modules/gke/main.tf).
      # This is the CI half of "step 2" in that module's enforcement-path comment: sign
      # every deployed digest so attestations are proven to land BEFORE the cluster rule
      # is ever switched from ALWAYS_ALLOW to REQUIRE_ATTESTATION. Hard-fails the build on
      # error — enforcement is off, so a signing failure cannot brick a live deploy, but a
      # silent failure here would hide a broken pipeline from whoever eventually flips
      # enforcement on. KMS does the signing; no private key ever touches the runner.
      # Skipped when Binary Authorization is disabled (binauthz_enabled=false → the
      # attestor/KMS resources are not provisioned and BINAUTHZ_ATTESTOR is unset). The
      # validate step above guarantees the three vars are all-set-or-all-unset, so gating
      # on the attestor alone is sufficient.
      - name: Sign images for Binary Authorization
        if: vars.BINAUTHZ_ATTESTOR != ''
        env:
          BINAUTHZ_ATTESTOR: ${{ vars.BINAUTHZ_ATTESTOR }}
          BINAUTHZ_KMS_KEYRING: ${{ vars.BINAUTHZ_KMS_KEYRING }}
          BINAUTHZ_KMS_KEY: ${{ vars.BINAUTHZ_KMS_KEY }}
        run: infra/ci/sign-images.sh

      # Optional GitHub/Sigstore provenance. Private repositories require GitHub
      # Enterprise Cloud for artifact attestations; leave the repository variable
      # ENABLE_GITHUB_ATTESTATIONS unset/false otherwise so a plan limitation cannot
      # block deployment. These are verified with `gh attestation verify`; they do
      # NOT satisfy GKE Binary Authorization REQUIRE_ATTESTATION.
      - name: Attest web image
        if: vars.ENABLE_GITHUB_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.build-push.outputs.web_image_name }}
          subject-digest: ${{ steps.build-push.outputs.web_digest }}
          push-to-registry: true

      - name: Attest migrate image
        if: vars.ENABLE_GITHUB_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.build-push.outputs.migrate_image_name }}
          subject-digest: ${{ steps.build-push.outputs.migrate_digest }}
          push-to-registry: true

  # ---- Deploy to GKE (cluster-gated; consumes build-push's digests) ----------
  # Split from build-push so the build above can overlap infra provisioning. This job keeps
  # the original preflight/suspended gate: it does the cluster-side work (get-creds → inject
  # settings → ESO/Reloader → apply-infra → migrate → rollout → prune → scan), all of which
  # need a live cluster + synced secrets (which in turn need Cloud SQL). Runs on a FRESH
  # runner, so it re-checks-out, re-auths to GCP, and reconstructs the image env vars from
  # build-push's job outputs (build-push wrote them to $GITHUB_ENV, which is same-job only).
  deploy:
    needs: [build-push, preflight] # digests from build-push + the suspended check
    # Two guards. (1) main-only — same WIF ref pin as build-push. (2) Skip entirely when
    # preflight found the environment suspended — no deploy against a missing cluster (the
    # job shows as skipped, with preflight's warning). build-push may still have run; its
    # repushed images are purged by the next suspend/auto-suspend, so that is harmless.
    if: github.ref == 'refs/heads/main' && needs.preflight.outputs.suspended != 'true'
    runs-on: ubuntu-latest
    # Reconstruct the coordinates the six consumer scripts expect (IMAGE_URI/WEB_DIGEST/
    # MIGRATE_IMAGE/MIGRATE_DIGEST) from build-push's job outputs, plus GCP_PROJECT_ID. Set
    # once at job scope so inject-settings/sign-images/run-migrations/prune/trivy read the
    # SAME env var names they always did — no per-script change. MIGRATE_IMAGE is the
    # digest-pinned reference (repo@sha256:…) those scripts consume directly.
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      IMAGE_URI:      ${{ needs.build-push.outputs.image_uri }}
      WEB_DIGEST:     ${{ needs.build-push.outputs.web_digest }}
      MIGRATE_DIGEST: ${{ needs.build-push.outputs.migrate_digest }}
      MIGRATE_IMAGE:  ${{ needs.build-push.outputs.migrate_image }}@${{ needs.build-push.outputs.migrate_digest }}
    # Hard cap beyond per-step timeouts. Worst-case declared budgets are two Helm upgrades
    # 10m + migration 10m + rollout 5m, before API/setup overhead. (The image build's 10m
    # moved to build-push.) 45m provides a real buffer while avoiding the runner's six-hour
    # default and never cancelling a live migration Job.
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write # Workload Identity Federation: request OIDC token
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Keyless auth to GCP — same WIF provider/SA as build-push (a fresh runner has no
      # inherited credentials). Needed by get-gke-credentials + every gcloud/kubectl below.
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # Trivy (end-of-job) pulls the images by digest from Artifact Registry, so this runner
      # must be authenticated to it too (build-push's docker-configure did not carry over).
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # The control plane has no public IP endpoint (enable_private_endpoint = true);
      # access is via the IAM-gated DNS-based endpoint, so request DNS-based creds.
      #
      # This step reads the cluster over the always-on regional container.googleapis.com
      # API, so it SUCCEEDS even when the DNS endpoint refuses the request. If this
      # step is green but the first helm/kubectl step below dies with
      # "Kubernetes cluster unreachable: ... Error 403 (Forbidden)!!1 ... That's an error",
      # that generic Google HTML page is the DNS endpoint's Front End refusing the request.
      # CONFIRMED CAUSE (commit a051ad7): an IAM Condition on the deployer's container role
      # pinned resource.name to the cluster path, which the DNS endpoint cannot satisfy for
      # container.clusters.connect. Also confirm allow_external_traffic is applied on the live
      # cluster (a separate prerequisite) — see infra/terraform/modules/{iam,gke}/main.tf.
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
          use_dns_based_endpoint: true

      # Preflight: prove the control plane is actually reachable over the DNS endpoint
      # BEFORE the build spends time on Helm. The creds step above can be green while the
      # DNS endpoint refuses this runner's request — historically caused by an IAM Condition
      # on the deployer role (removed in a051ad7), and also possible if allow_external_traffic
      # drifts off. Helm surfaces either as a cryptic "Kubernetes cluster unreachable: <html>
      # 403" that reads like a Helm/chart fault. This probe hits the API server's /readyz path;
      # a generic 403 HTML page means a Google-Front-End rejection, which we detect and
      # translate into the two gates to check instead of a misleading downstream error.
      - name: Verify control plane reachable (DNS endpoint)
        run: infra/ci/verify-control-plane.sh

      # Inject the real per-environment values into the overlay's single
      # source of truth (settings.yaml). Kustomize `replacements` fan these
      # out into the Workload-Identity SA annotation, the HTTPRoute host, the Gateway
      # cert-map annotation + static-IP address, and NEXTAUTH_URL. The image is separate because its
      # digest is build output, not environment config: CI pins `images` directly to
      # THIS build's repo + immutable registry digest (not :latest),
      # so the rendered Deployment is reproducible and the migrate→rollout gate
      # below is real. `yq` is preinstalled on ubuntu-latest runners.
      - name: Inject environment values
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # Non-secret app config promoted out of Secret Manager. OPTIONAL GitHub Actions
          # repo vars: if unset they fall back to the committed settings.yaml value (see the
          # `env(X) // .data.field` yq below), so a fresh checkout deploys correctly without
          # them. Set them only to override the committed default per-environment.
          AUTH_GITHUB_ID: ${{ vars.AUTH_GITHUB_ID }}
          AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PRICE_ID_MONTHLY: ${{ vars.STRIPE_PRICE_ID_MONTHLY }}
          STRIPE_PRICE_ID_YEARLY: ${{ vars.STRIPE_PRICE_ID_YEARLY }}
          # "true" attaches the Cloud Armor policy; unset (dev $0 default) → no edge WAF.
          # run.sh set-repo-secrets sets/clears this from the Terraform armor_enabled state.
          ARMOR_ENABLED: ${{ vars.ARMOR_ENABLED }}
        run: infra/ci/inject-settings.sh

      # Render the overlay ONCE to /tmp/rendered.yaml; the infra apply and the
      # post-migration rollout below both consume that same render (real migrate→rollout
      # gate, not the old :latest race). See infra/ci/render-manifests.sh. This is
      # cluster-independent CPU-only work (inject-settings mutated settings.yaml above,
      # kustomize renders it), so it runs BEFORE the operator install — off the critical
      # path — instead of being wedged between two cluster operations.
      - name: Render manifests
        run: infra/ci/render-manifests.sh

      # The overlay ships an ESO SecretStore + ExternalSecret (Secret Manager →
      # devstash-secrets) and web Deployment secret-reload annotations, so BOTH External
      # Secrets Operator and Stakater Reloader must be installed before `apply -k`. The two
      # installs are independent (different releases/namespaces, no shared state) and each is
      # a `helm upgrade --install ... --wait --timeout 5m`, so ensure-operators.sh runs them
      # CONCURRENTLY (up to ~5 min saved on a cold cluster vs. back-to-back) and joins on both
      # before returning. It delegates to the same ensure-eso.sh / ensure-reloader.sh that
      # run.sh runs individually — only the parallelism is added here. --version for each chart
      # is read from infra/versions.env (single source of truth shared with run.sh).
      - name: Ensure operators (ESO ‖ Reloader)
        run: infra/ci/ensure-operators.sh

      # Apply everything EXCEPT the web Deployment (server-side, --force-conflicts) so
      # existing pods keep the previous image until the post-migration rollout. The full
      # rationale — why --force-conflicts is required and safe (the one-time CSA→SSA
      # ownership transfer) — lives in infra/ci/apply-infra.sh.
      - name: Apply infra (everything except the web Deployment)
        run: infra/ci/apply-infra.sh

      # Gate on devstash-app-config having an ENABLED version BEFORE the ESO wait, to close the
      # version-bump race: the write-only Terraform version resource disables the old version and
      # adds the new one as two separate operations, leaving a brief gap with zero enabled
      # versions. A deploy landing in that gap used to read an empty blob and finish green with the
      # app broken. This polls a short window so an apply/resume mid-bump resolves, and fails
      # loudly if no enabled version appears (a real fault, not a parked env). See
      # infra/ci/check-secret-version.sh.
      - name: Ensure app-config has an enabled version (gate)
        run: infra/ci/check-secret-version.sh

      - name: Wait for secrets to sync (ESO)
        # devstash-secrets is materialized by External Secrets Operator from
        # Secret Manager. Both the migrate Job and the web pods need it, so block
        # until the ExternalSecret reports Ready before running anything against
        # the database. The source blob (devstash-app-config) always has an enabled
        # version (the preceding gate guarantees it), but its infra keys
        # (redis-*/database-*) are omitted while the env is suspended / mid-resume —
        # ESO can't sync then. When the script finds those properties missing it
        # warns, sets synced=false, and finishes without failing; a blob with every
        # property that still won't sync — or an empty blob — fails loudly. The
        # migrate + rollout steps below gate on synced=true.
        id: eso-sync
        run: infra/ci/wait-secrets-sync.sh

      - name: Run DB migrations + seed item types (gated)
        # Skipped when secrets never synced (suspended/mid-resume env) — the migrate
        # Job would otherwise fail on missing DB credentials.
        if: steps.eso-sync.outputs.synced == 'true'
        run: infra/ci/run-migrations.sh

      # Migrations have landed — apply the digest-pinned web Deployment from the same
      # render to trigger the rolling update. Same SSA/--force-conflicts posture as the
      # infra apply; see infra/ci/rollout-web.sh.
      - name: Roll out the web Deployment (post-migration)
        if: steps.eso-sync.outputs.synced == 'true'
        run: infra/ci/rollout-web.sh

      - name: Wait for rollout
        if: steps.eso-sync.outputs.synced == 'true'
        run: infra/ci/wait-rollout.sh

      # Pod-Ready (above) is NOT servable: GKE Gateway programs the LB backend (NEG attach + its
      # own health check) on a separate path the rollout gate can't see, so the URL 502s for
      # minutes after the rollout passes — worst on a from-scratch resume. Gate on the public URL
      # actually reporting healthy so a green deploy means a live site. See infra/ci/wait-endpoint.sh.
      - name: Wait for public endpoint to serve
        if: steps.eso-sync.outputs.synced == 'true'
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
        run: infra/ci/wait-endpoint.sh

      # Delete superseded image versions the instant the rollout is healthy, keeping only the
      # just-deployed digest per image — an immediate equivalent of the repository's
      # keep_count=1 cleanup policy (which otherwise runs only on Artifact Registry's ~daily
      # async sweep). Runs LAST so no pruned version is still being served. Best-effort:
      # continue-on-error so a registry hiccup can never fail an already-successful deploy.
      - name: Prune superseded registry versions
        continue-on-error: true
        # WEB_DIGEST/MIGRATE_DIGEST come from the job-level env (reconstructed from
        # build-push's job outputs) — the build-push STEP no longer runs in this job.
        run: infra/ci/prune-registry.sh

      # Vulnerability scans (warn-only). Moved to the end of the deployment workflow
      # so that the web app rollout begins and completes earlier, reducing time-to-live.
      # Docker is authenticated to Artifact Registry; Trivy pulls the images by digest.
      - name: Scan web image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}@${{ env.WEB_DIGEST }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '0'
          trivyignores: .github/.trivyignore.yaml

      - name: Scan migrate image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.MIGRATE_IMAGE }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '0'
          trivyignores: .github/.trivyignore.yaml
