# Mandatory formatting + lint gate for infra/cli (devstash-infra).
# Install once:  cd infra/cli && uv run pre-commit install
# These hooks call the uv.lock-pinned ruff (via `uv run`) — NOT a second,
# separately-versioned ruff — so pre-commit, CI, and local dev format identically
# and no new supply-chain surface is introduced (honors the uv --frozen discipline).
#
# `ruff format` runs in --check mode: a commit with unformatted code FAILS. Run
# `uv run ruff format` to fix, then re-commit. This is how every author (human or
# AI agent) is forced to produce code compliant with the strict standard.
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (mandatory — infra/cli)
        entry: uv run --project infra/cli ruff format --check
        language: system
        files: ^infra/cli/.*\.py$
        pass_filenames: false
      - id: ruff-check
        name: ruff check (mandatory — infra/cli)
        entry: uv run --project infra/cli ruff check
        language: system
        files: ^infra/cli/.*\.py$
        pass_filenames: false
