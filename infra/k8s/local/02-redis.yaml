# Valkey for the local run. The app talks NATIVE node-redis straight to this Valkey over
# TCP (REDIS_URL=rediss://redis:6379, see src/lib/infra/redis-tcp.ts) — the SAME client
# path as GCP (node-redis → Memorystore for Valkey). No SRH proxy: this aligns local with
# the managed-GCP architecture.
#   app  ──TLS(rediss://REDIS_URL)──►  redis:6379
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: devstash
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          # Pinned to the same MAJOR engine line GCP Memorystore runs (Valkey 9.0, see
          # modules/memorystore/main.tf: engine_version = "VALKEY_9_0"). The floating :9
          # tag tracks newest 9.x patches while staying on GCP's engine line. Valkey is
          # RESP-compatible, so node-redis and redis-cli work unchanged.
          image: valkey/valkey:9
          # Config mirrors GCP Memorystore for Valkey's EFFECTIVE settings so local behaves
          # identically (the managed instance sets no explicit engine config → GCP defaults):
          #   • TLS-only (port 0 disables plaintext; tls-port 6379) with tls-auth-clients no
          #     → SERVER_AUTHENTICATION parity: the server presents a cert, the client
          #     verifies the CA but presents NO client cert (Valkey's default TLS is MUTUAL,
          #     which would be stricter than GCP — hence the explicit "no").
          #   • maxmemory-policy volatile-lru — Memorystore for Valkey's default eviction
          #     policy (OSS default is noeviction, which would diverge).
          #   • save "" + appendonly no — no persistence, matching our managed instance
          #     (no persistence_config block) and the disposable-cache intent. OSS default
          #     is RDB save-points on.
          # The one GCP feature NOT mirrored is IAM AUTH: Valkey OSS has no GCP IAM support,
          # so local stays no-auth over TLS (REDIS_IAM_AUTH unset). The single app code path
          # covers both: TLS is on for rediss:// + REDIS_CA_CERT; the IAM token path runs
          # only when REDIS_IAM_AUTH=true (unset here). See src/lib/infra/redis-tcp.ts.
          command: ["valkey-server"]
          args:
            - --port
            - "0"
            - --tls-port
            - "6379"
            - --tls-cert-file
            - /tls/tls.crt
            - --tls-key-file
            - /tls/tls.key
            - --tls-ca-cert-file
            - /tls/ca.crt
            - --tls-auth-clients
            - "no"
            - --maxmemory-policy
            - volatile-lru
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - { containerPort: 6379 } # Valkey (TLS)
          # TLS material generated per `up` by run.sh (ensure_valkey_tls) into the valkey-tls
          # Secret — the SAME CA the app verifies against (REDIS_CA_CERT). Mounted read-only.
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          readinessProbe:
            # Must speak TLS now that the plaintext port is disabled; verifies against the CA
            # (the SAN covers 127.0.0.1, so no --insecure needed).
            exec: { command: ['redis-cli', '-p', '6379', '--tls', '--cacert', '/tls/ca.crt', 'ping'] }
            initialDelaySeconds: 5
            periodSeconds: 3
      volumes:
        - name: tls
          secret:
            secretName: valkey-tls
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: devstash
spec:
  # ClusterIP: Valkey (:6379) stays cluster-internal — the app reaches it via the DNS
  # name `redis`. No NodePort now that the bundled web UI is gone.
  type: ClusterIP
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
