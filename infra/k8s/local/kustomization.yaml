apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Backing-service base for the local kind run — Postgres, Redis, MinIO, Mailpit, and the
# dashboard tools (Headlamp, pgAdmin). This is the local analog of the managed GCP services
# (Cloud SQL / Memorystore / GCS) that Terraform provisions for the dev env; here they run
# as in-cluster pods. It is a BASE (not an overlay): the app-under-test overlay lives in
# infra/k8s/overlays/local/ and is applied separately by devstash-infra local.
#
# Render:  kubectl kustomize infra/k8s/local
# Apply:   devstash-infra local applies this base in ORDERED SLICES (postgres → redis →
#          minio/mailpit → bucket-init job → dashboards), waiting for readiness between each,
#          via `kubectl kustomize infra/k8s/local | yq 'select(...)' | kubectl apply`.
#
# kind-config.yaml is NOT a resource here — it is the kind cluster config (consumed by
# infra/terraform/modules/kind via file() and by devstash-infra local), not a Kubernetes manifest.
#
# NOTE: do NOT add a top-level `namespace:` field here — it stamps every rendered
# resource including the standalone `Namespace: headlamp` object in 06-headlamp.yaml,
# renaming it to "devstash" and silently breaking headlamp's own namespace creation.
# Use the `patches` block below instead to scope the namespace fix to just the two
# generated ConfigMaps.
resources:
  - 01-postgres.yaml
  - 02-redis.yaml
  - 05-minio-mailpit.yaml
  - 06-headlamp.yaml
  - 07-pgadmin.yaml

# The init scripts were previously turned into ConfigMaps at runtime by devstash-infra local
# (`configmap_from_script`). They are now generated declaratively so `kubectl kustomize`
# renders the complete stack. disableNameSuffixHash keeps the generated names stable
# (minio-bucket-init-script / pgadmin-seed-script) so the static `configMap.name` volume
# references in 05-minio-mailpit.yaml and 07-pgadmin.yaml keep resolving — the manifests
# mount these at /scripts and run them by that path.
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: minio-bucket-init-script
    files:
      - scripts/minio-bucket-init.sh
  - name: pgadmin-seed-script
    files:
      - scripts/pgadmin-seed-pgpass.sh

# configMapGenerator has no per-entry namespace field, so its output carries none —
# `kubectl apply -f -` (run without -n) then drops these into the caller's current-context
# default namespace instead of devstash, breaking the Job/pods in devstash that mount them.
# minio-bucket-init-script lands in devstash (mounted by the minio-bucket-init Job there);
# pgadmin-seed-script lands in devstash too (mounted by the pgadmin Deployment there).
patches:
  - target:
      kind: ConfigMap
      name: minio-bucket-init-script
    patch: |-
      - op: add
        path: /metadata/namespace
        value: devstash
  - target:
      kind: ConfigMap
      name: pgadmin-seed-script
    patch: |-
      - op: add
        path: /metadata/namespace
        value: devstash
