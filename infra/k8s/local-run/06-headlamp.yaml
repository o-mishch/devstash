# Headlamp — an in-cluster web UI to view/manage the ENTIRE cluster (all
# namespaces). Single image (ghcr.io/headlamp-k8s/headlamp), plain manifest,
# exposed on NodePort 30090 → mapped to localhost:8090 by the kind config.
#
# LOCAL ONLY. The service account is bound to cluster-admin so the UI can see and
# manage everything — acceptable for a throwaway kind cluster, NEVER for prod.
# Login uses a bearer token: `kubectl create token headlamp-admin -n headlamp`.
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: headlamp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: headlamp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp
spec:
  replicas: 1
  selector:
    matchLabels: { app: headlamp }
  template:
    metadata:
      labels: { app: headlamp }
    spec:
      serviceAccountName: headlamp-admin
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:latest
          args:
            - "-in-cluster"
            - "-plugins-dir=/headlamp/plugins"
          ports:
            - containerPort: 4466
          livenessProbe:
            httpGet: { path: /, port: 4466 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 4466 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: headlamp
spec:
  type: NodePort
  selector: { app: headlamp }
  ports:
    - { port: 4466, targetPort: 4466, nodePort: 30090 }
