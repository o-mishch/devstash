apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This directory (local-run/) contains only the in-cluster backing services for the
# local kind run — Postgres, Redis, MinIO, Mailpit, and the dashboard tools. It does
# NOT represent the app overlay. The actual app kustomization lives in:
#   infra/k8s/overlays/local/
# and is rendered+applied by infra/k8s/local-run/run.sh (OVERLAY=infra/k8s/overlays/local).
#
# This file exists so `kubectl kustomize infra/k8s/local-run` does not error; it
# enumerates the backing-service manifests that run.sh applies directly with
# `kubectl apply -f`. It is NOT a kustomization that the app overlay inherits from.
#
# NOTE: 03-app-secret.yaml and patches/ were moved to infra/k8s/overlays/local/
# during the overlay consolidation. Do not restore them here.

resources:
  - 01-postgres.yaml
  - 02-redis.yaml
  - 05-minio-mailpit.yaml
  - 06-headlamp.yaml
  - 07-pgadmin.yaml
