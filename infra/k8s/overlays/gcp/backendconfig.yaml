apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: devstash-backendconfig
spec:
  # Tell the Google Cloud Load Balancer how to health-check backends. Without
  # this the LB health-checks "/" and may mark healthy pods as down. We point it
  # at the shallow liveness path (no DB — the LB should not remove a backend just
  # because the DB is slow; readiness probes handle that within the cluster).
  # port: 3000 must match containerPort in base/deployment.yaml.
  # timeoutSec (5) < checkIntervalSec (10): required — check must complete within interval.
  # healthyThreshold: 1 — re-admits a backend after a single passing check. This is
  # intentionally aggressive: the K8s readiness probe already prevents un-ready pods
  # from being registered to the NEG (container-native LB), so the LB only sees pods
  # that are already serving traffic.
  healthCheck:
    type: HTTP
    requestPath: /api/health
    port: 3000
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
  # GKE's current NEG scale-down guidance pairs a 60s backend drain with a 120s
  # preStop hook and 210s pod grace period. This accommodates drain-trigger and NEG
  # detach latency, then leaves shutdown time after SIGTERM.
  # TREAT AS ONE UNIT: drainingTimeoutSec (60) / preStop sleep (120) /
  # terminationGracePeriodSeconds (210) in base/deployment.yaml must stay in sync.
  # The health check endpoint must return 200 (not a redirect) — the LB marks
  # backends down if it receives 3xx at checkIntervalSec, which would remove the pod
  # before the drain completes.
  connectionDraining:
    drainingTimeoutSec: 60
  # Cloud Armor WAF + rate limiting. The policy is created by Terraform
  # (modules/network: google_compute_security_policy) and its name is injected
  # by the kustomize replacement in kustomization.yaml from settings.yaml.
  # IMPORTANT: IAP and Cloud CDN cannot both be enabled on the same BackendConfig —
  # they are mutually exclusive on a GCP backend service. Do not add iap: or cdn:
  # fields here without removing the other. Current config: Armor only, no IAP/CDN.
  securityPolicy:
    name: ARMOR_POLICY_NAME
  # Enable GCP load balancer access logging so every request is visible in
  # Cloud Logging (resource type "http_load_balancer"). Without this, only
  # Cloud Armor-blocked requests generate log entries; legitimate traffic is
  # invisible. sampleRate: 1.0 logs all requests — acceptable for the expected
  # traffic volume; reduce to 0.1-0.5 if Cloud Logging costs become significant.
  logging:
    enable: true
    sampleRate: 1.0
