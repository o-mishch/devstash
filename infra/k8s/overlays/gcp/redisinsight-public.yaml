# RedisInsight — PUBLIC web UI for Memorystore, protected by Identity-Aware Proxy.
#
# WHY THIS EXISTS
#   GCP has NO native data browser for Memorystore (the Console shows only config +
#   metrics, never keys). Memorystore also has no public IP. So to "see what's in
#   Redis" from the open internet you run RedisInsight in-cluster (it reaches
#   Memorystore over the VPC) and publish it behind a Google Cloud HTTPS Load
#   Balancer fronted by IAP — only allowlisted Google accounts get in.
#
#   Prefer the on-demand port-forward (redisinsight.yaml) for day-to-day debugging.
#   Use THIS only when you need a real public URL (e.g. a portfolio demo) — it runs
#   permanently and provisions its own LB (~$18/mo) + static IP + managed cert.
#
# Deliberately NOT in kustomization.yaml `resources` — apply it explicitly, and the
# IAP/OAuth/DNS wiring below is a manual one-time setup.
#
# ── ONE-TIME SETUP (run once per project) ─────────────────────────────────────
# 0. Pick a host. This file assumes  redis-ui.gke.devstash.one  — a subdomain so it
#    never collides with the app (gke.devstash.one) or Vercel apex.
#
# 1. Reserve a static IP for this Ingress:
#      gcloud compute addresses create redisinsight-ip --global
#      gcloud compute addresses describe redisinsight-ip --global --format='value(address)'
#    Create a DNS A-record:  redis-ui.gke.devstash.one  ->  that IP.
#
# 2. Configure the OAuth consent screen once (Console: APIs & Services → OAuth
#    consent screen → "Internal" if you have a Workspace org, else "External").
#    NOTE: with Google-managed OAuth (this manifest, iap.enabled with NO
#    oauthclientCredentials) IAP auto-provisions the OAuth client — you do NOT
#    create a brand/client or a creds Secret yourself. This is the modern default;
#    the consent screen is the only OAuth prerequisite.
#
# 3. Grant yourself (and anyone else) access through IAP:
#      gcloud iap web add-iam-policy-binding \
#        --resource-type=backend-services \
#        --member="user:you@example.com" \
#        --role="roles/iap.httpsResourceAccessor"
#
# 4. Apply, wait for the cert (DNS must resolve to the IP first), then open the URL:
#      kubectl apply -f infra/k8s/overlays/gcp/redisinsight-public.yaml
#      kubectl -n devstash describe managedcertificate redisinsight-cert   # Active?
#      open https://redis-ui.gke.devstash.one
#    Add the Memorystore connection inside the UI — host/AUTH/CA come from the synced
#    Secret exactly as in redisinsight.yaml (rediss://, TLS on, upload REDIS_CA_CERT).
#
# Tear down:  kubectl -n devstash delete -f infra/k8s/overlays/gcp/redisinsight-public.yaml
#             gcloud compute addresses delete redisinsight-ip --global
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight-public
  namespace: devstash
  labels:
    app.kubernetes.io/name: devstash
    app.kubernetes.io/component: redisinsight-public
spec:
  replicas: 1
  selector:
    matchLabels: { app: redisinsight-public }
  template:
    metadata:
      labels: { app: redisinsight-public }
    spec:
      # Pod-level security context — PSA "restricted" (devstash namespace label)
      # requires runAsNonRoot and seccompProfile. RedisInsight 2.x runs as UID 1000;
      # pin it explicitly (kept in sync with redisinsight.yaml, the port-forward variant).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redisinsight
          # Pin to a specific version — :latest is not reproducible. Keep in sync with
          # the port-forward variant (redisinsight.yaml). Check hub.docker.com/r/redis/redisinsight/tags.
          image: redis/redisinsight:2.62
          ports:
            - { name: http, containerPort: 5540 }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            # cpu limit required by GKE Autopilot billing model and pod stability.
            limits: { cpu: 500m, memory: 512Mi }
          # Container-level hardening — PSA "restricted" requires all three.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          # Ephemeral: connection config is lost on pod restart.
          # Use a PVC if persistent connection storage is needed.
          emptyDir:
            sizeLimit: 256Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
# IAP gate. The Google Cloud Load Balancer enforces auth BEFORE traffic reaches the
# pod — RedisInsight has no auth of its own, so this is what keeps it off the open
# internet. Google-managed OAuth: `enabled` with NO oauthclientCredentials → IAP
# auto-provisions the OAuth client (modern default; no brand/client/Secret to manage).
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: redisinsight-iap
  namespace: devstash
spec:
  iap:
    enabled: true
  # Cloud Armor WAF + rate-limiting — same policy as the main app BackendConfig.
  # EMPTY by default: dev runs with armor_enabled=false ($0 posture), so the policy does
  # not exist. This is a hand-applied debug tool (RedisInsight), so it is NOT templated by
  # kustomize — if you enable Armor (armor_enabled=true / prod), set this back to
  # "devstash-dev-armor" (the name Terraform creates in modules/network/main.tf).
  securityPolicy:
    name: ""
  healthCheck:
    type: HTTP
    requestPath: /api/health
    port: 5540
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight-public
  namespace: devstash
  labels:
    app.kubernetes.io/name: devstash
    app.kubernetes.io/component: redisinsight-public
  annotations:
    cloud.google.com/backend-config: '{"default":"redisinsight-iap"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector: { app: redisinsight-public }
  ports:
    - { port: 5540, targetPort: http }
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: redisinsight-cert
  namespace: devstash
spec:
  domains:
    - redis-ui.gke.devstash.one
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redisinsight-public
  namespace: devstash
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "redisinsight-ip"
    networking.gke.io/managed-certificates: "redisinsight-cert"
spec:
  rules:
    - host: redis-ui.gke.devstash.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redisinsight-public
                port: { number: 5540 }
