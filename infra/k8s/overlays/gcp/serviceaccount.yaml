apiVersion: v1
kind: ServiceAccount
metadata:
  name: devstash
  # Workload-Identity identity for ESO's SecretStore serviceAccountRef (reads Secret
  # Manager) AND the web Deployment (kustomization.yaml patches serviceAccountName:
  # devstash onto it). The web pods need ambient Google credentials because Memorystore
  # for Valkey runs in IAM_AUTH mode: redis-tcp.ts mints a per-connect OAuth2 token from
  # this SA's identity (roles/memorystore.dbConnectionUser, granted in modules/iam). The
  # migration Job still runs as `default` — it only reaches Cloud SQL over TCP, no Google
  # API calls. The matching roles/iam.workloadIdentityUser binding is managed by Terraform.
  annotations:
    iam.gke.io/gcp-service-account: devstash-app@PROJECT_ID.iam.gserviceaccount.com
