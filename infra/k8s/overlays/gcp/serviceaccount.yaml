apiVersion: v1
kind: ServiceAccount
metadata:
  name: devstash
  # Dedicated identity used by ESO's SecretStore serviceAccountRef to read Secret
  # Manager. Web and migration pods do not run as this SA: they consume the resulting
  # Kubernetes Secret and GCS HMAC credentials, so granting them ambient Google API
  # credentials would add attack surface without enabling any application feature.
  # The matching roles/iam.workloadIdentityUser binding is managed by Terraform.
  annotations:
    iam.gke.io/gcp-service-account: devstash-app@PROJECT_ID.iam.gserviceaccount.com
