apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: devstash-frontendconfig
spec:
  # GKE Ingress otherwise leaves the HTTP forwarding rule serving plaintext traffic.
  # FrontendConfig needs BOTH HTTP and HTTPS listeners active on the Ingress — it turns
  # port 80 into a redirect-only rule at the LB layer, before traffic reaches pods.
  # 308 PERMANENT_REDIRECT preserves request method (POST stays POST), which matters
  # for Stripe webhooks or any API call accidentally sent to http://.
  #
  # HOW IT WORKS: FrontendConfig is referenced via the Ingress annotation
  # `networking.gke.io/v1beta1.FrontendConfig: "devstash-frontendconfig"` (set in
  # kustomization.yaml patches). Without that annotation this resource has no effect.
  # The redirect is enforced at the Google Cloud LB layer, not in the application.
  #
  # DO NOT remove the HTTP listener from the Ingress spec — FrontendConfig requires
  # the HTTP forwarding rule to exist so it can configure the redirect on it. Removing
  # it leaves port 80 either open (no redirect) or broken, depending on LB state.
  redirectToHttps:
    enabled: true
    responseCodeName: PERMANENT_REDIRECT
