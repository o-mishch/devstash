# External Secrets Operator (ESO) wiring — Secret Manager → K8s Secret.
#
# The base Deployment reads `envFrom: secretRef: devstash-secrets`. On GCP we do
# NOT ship a plaintext Secret; instead ESO pulls each value from Google Secret
# Manager at runtime (refreshed every 1h) and materializes `devstash-secrets`.
# Auth is keyless: the SecretStore uses Workload Identity via a dedicated K8s SA
# (`devstash`), which is bound to the app Google SA that holds
# roles/secretmanager.secretAccessor (Terraform: modules/iam).
#
# BEST PRACTICE NOTES (do not change without understanding these):
# - Never use a service account JSON key for the SecretStore — keyless Workload
#   Identity is the correct pattern for GKE. No JSON key should ever touch the cluster.
# - The SecretStore is namespace-scoped (not ClusterSecretStore) — this is intentional:
#   only workloads in the `devstash` namespace can reference it. A ClusterSecretStore
#   would expose all secrets to all namespaces, violating least-privilege.
# - Anyone who can edit a SecretStore can redirect secret fetches to a different Secret
#   Manager project. Protect with RBAC: restrict who can modify SecretStore resources.
# - refreshInterval: 1h is the default. ESO itself does NOT hot-reload env vars in
#   running pods — Stakater Reloader handles that via rolling restart on Secret change.
#
# PREREQUISITE (one-time, not in this overlay): install ESO in the cluster at the
# version pinned in infra/versions.env. Use devstash-infra gcp eso (preferred — idempotent, handles
# repo add + upgrade --install + rollout wait) rather than a bare `helm install`:
#   devstash-infra gcp eso
# Or manually:
#   source infra/versions.env          # sets ESO_VERSION
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm upgrade --install external-secrets external-secrets/external-secrets \
#     --version "$ESO_VERSION" -n external-secrets --create-namespace --wait --timeout 5m
# (CRDs SecretStore/ExternalSecret must exist before `kubectl apply -k`.)
#
# The `projectID` placeholder is fanned in from settings.yaml via a replacement
# (see kustomization.yaml), same as PROJECT_ID elsewhere.
#
# ROTATION: ESO refreshes the `devstash-secrets` K8s Secret every 1h, but the
# Deployment consumes it via `envFrom` — env vars are read ONCE at pod start and are
# NOT hot-reloaded. Stakater Reloader (installed by devstash-infra gcp eso + CI) watches this
# Secret and automatically triggers a rolling restart of devstash-web when ESO writes
# a new version, so secret rotation in Secret Manager propagates without any manual
# `kubectl rollout restart`. See infra/docs/08-gcp-bootstrap.md §13 for the rotation
# runbook.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID
      auth:
        # No static key — authenticate as the ESO SecretStore identity. The
        # referenced K8s SA (`devstash`) is annotated with the Google SA in
        # serviceaccount.yaml and granted secretAccessor in Terraform. Application
        # pods do not run as this SA; only ESO requests its federated identity.
        #
        # clusterProjectID / clusterLocation / clusterName are required by ESO's
        # GCP GCPSM backend when using `workloadIdentity` auth (Pattern 2 in ESO docs:
        # external-secrets.io/v1/provider/gcp-secret-manager). Without them, ESO
        # falls back to the node's ambient ADC, which may not carry the correct
        # service-account identity for the bound K8s SA → SecretStore stays NotReady.
        #
        # clusterProjectID is injected by CI via the kustomize replacement of
        # data.projectId in settings.yaml (same as gcpsm.projectID above).
        #
        # clusterLocation and clusterName are intentionally hard-coded here (no
        # kustomize replacement) because:
        #   1. They are derived from stable Terraform locals: name_prefix = "devstash-dev"
        #      (locals.tf), cluster = "${name_prefix}-gke" (modules/gke/main.tf).
        #   2. Adding kustomize replacements for them would require two more settings.yaml
        #      fields that are only ever changed alongside a Terraform infra change anyway.
        #
        # FAILURE MODE IF STALE: GCP STS rejects the Workload Identity token exchange
        # for the wrong cluster name/location. The SecretStore condition stays NotReady;
        # ESO never materializes devstash-secrets; all pods fail with "secret not found".
        #
        # WHEN TO UPDATE: if the GKE cluster is recreated in a different region OR the
        # Terraform `var.environment` tfvar is renamed (e.g. "dev" → "prod"), update
        # BOTH values below AND the CLUSTER/REGION env vars at the top of
        # .github/workflows/deploy-gke.yml to match.
        workloadIdentity:
          clusterProjectID: PROJECT_ID
          clusterLocation: us-central1   # must match REGION in deploy-gke.yml
          clusterName: devstash-dev-gke  # must match CLUSTER in deploy-gke.yml
          serviceAccountRef:
            name: devstash
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devstash-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    # Produces the Secret the Deployment consumes via envFrom.
    name: devstash-secrets
    creationPolicy: Owner
    # deletionPolicy governs provider-side deletion, not deletion of this
    # ExternalSecret. Retain keeps the target Secret and reports SecretSyncedError if
    # all referenced Secret Manager values disappear. Because creationPolicy=Owner,
    # deleting the ExternalSecret itself still garbage-collects the target Secret.
    deletionPolicy: Retain
  data:
    # COMPLETENESS NOTE — intentionally absent vars (do not add them here):
    # - EMAIL_FROM, NEXTAUTH_URL: non-secret constants → configMapGenerator / kustomize
    #   replacement in kustomization.yaml (ConfigMap, not Secret).
    # - AUTH_GITHUB_ID, AUTH_GOOGLE_ID: OAuth CLIENT IDs — non-secret (sent in every OAuth
    #   redirect, visible client-side) → settings.yaml → kustomize replacement into the
    #   ConfigMap. Only the client SECRETS (AUTH_*_SECRET) remain in Secret Manager below.
    # - STRIPE_PUBLISHABLE_KEY: public by Stripe's design (pk_...); STRIPE_PRICE_ID_MONTHLY /
    #   _YEARLY: non-sensitive identifiers (price_...) → all three to the ConfigMap via
    #   settings.yaml. Only STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET stay in Secret Manager.
    # - AWS_ENDPOINT_URL_S3, AWS_REGION: fixed, environment-independent constants → plain
    #   configMapGenerator literals in kustomization.yaml (ConfigMap, not Secret Manager).
    # - AWS_S3_BUCKET: deterministic from PROJECT_ID (module.gcs.bucket_name's naming
    #   formula) → computed by the same CI yq step as saEmail → settings.yaml → kustomize
    #   replacement into the ConfigMap. Not a Secret Manager round-trip.
    # - DISABLE_EMAIL_VERIFICATION: intentionally unset on GKE; mail flows via Resend.
    # - UPSTASH_REDIS_REST_URL / _TOKEN: Vercel-only path; GKE uses REDIS_URL below.
    # REDIS_URL/REDIS_CA_CERT/DATABASE_CA_CERT have no equivalent in .env — they are
    # generated by Terraform and only exist on GKE.
    #
    # SINGLE-SECRET CONSOLIDATION — every value below is a JSON property of ONE Secret
    # Manager secret, devstash-app-config (modules/iam builds it via jsonencode). remoteRef
    # extracts each key with .property (gjson path over the JSON blob). This keeps a deep-
    # suspended env within Secret Manager's 6-active-version always-free tier: one active
    # version instead of ~14. The property NAMES are the same short keys Terraform used as
    # the old per-secret suffixes (auth-secret, database-url, s3-secret, …). While the env
    # is suspended the infra keys (database-*/redis-*) are simply absent from the blob; ESO
    # only runs on a resumed cluster, where Terraform has repopulated all keys first.
    #
    # --- Provisioned by Terraform (modules/iam, modules/gcs, modules/memorystore) ---
    # GCS via S3-interop HMAC credentials (endpoint/region are non-secret, see above).
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: devstash-app-config, property: s3-access-id }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: devstash-app-config, property: s3-secret }
    # Native Redis: the app connects straight to managed Memorystore via ioredis
    # (no SRH proxy). REDIS_URL is rediss://default:<auth>@<host>:<port> (AUTH on +
    # in-transit TLS); REDIS_CA_CERT verifies Memorystore's server cert. Both built
    # by Terraform (modules/memorystore); precede the Upstash vars in the app.
    - secretKey: REDIS_URL
      remoteRef: { key: devstash-app-config, property: redis-url }
    - secretKey: REDIS_CA_CERT
      remoteRef: { key: devstash-app-config, property: redis-ca-cert }
    # DATABASE_URL/DIRECT_URL target the managed Cloud SQL private IP and are
    # generated by Terraform (modules/cloudsql) — NOT hand-created / not in tfvars.
    - secretKey: DATABASE_URL
      remoteRef: { key: devstash-app-config, property: database-url }
    - secretKey: DIRECT_URL
      remoteRef: { key: devstash-app-config, property: direct-url }
    # Cloud SQL server CA — the app's node-postgres adapter verifies the TLS chain
    # against it (verify-CA). Built by Terraform (modules/cloudsql server_ca_cert).
    - secretKey: DATABASE_CA_CERT
      remoteRef: { key: devstash-app-config, property: database-ca-cert }
    # --- Supplied by var.third_party_secrets (gitignored tfvars) ----------------------
    # These land as properties of the SAME devstash-app-config blob (modules/iam merges
    # var.app_secrets into it), so the app SA's single accessor binding covers them too.
    - secretKey: AUTH_SECRET
      remoteRef: { key: devstash-app-config, property: auth-secret }
    # AUTH_GITHUB_ID / AUTH_GOOGLE_ID are non-secret OAuth client IDs → ConfigMap
    # (see completeness note above). Only the client secrets stay here.
    - secretKey: AUTH_GITHUB_SECRET
      remoteRef: { key: devstash-app-config, property: auth-github-secret }
    - secretKey: AUTH_GOOGLE_SECRET
      remoteRef: { key: devstash-app-config, property: auth-google-secret }
    - secretKey: RESEND_API_KEY
      remoteRef: { key: devstash-app-config, property: resend-api-key }
    # EMAIL_FROM is a non-secret constant — lives in devstash-config ConfigMap,
    # not here. See kustomization.yaml configMapGenerator.
    - secretKey: STRIPE_SECRET_KEY
      remoteRef: { key: devstash-app-config, property: stripe-secret-key }
    # STRIPE_PUBLISHABLE_KEY (public pk_...) + STRIPE_PRICE_ID_MONTHLY / _YEARLY
    # (non-sensitive identifiers) are non-secret → ConfigMap (see note above).
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef: { key: devstash-app-config, property: stripe-webhook-secret }
    - secretKey: OPENAI_API_KEY
      remoteRef: { key: devstash-app-config, property: openai-api-key }
