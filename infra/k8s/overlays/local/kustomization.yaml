apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local overlay — mirrors overlays/gcp/ as closely as possible so local and GCP
# share the same base manifest (securityContext, probes, resources, PDB,
# NetworkPolicy). Local-only deltas are patched on:
#   - NodePort Service (kind port mapping → localhost:8080)
#   - Single replica (no point in 2 locally)
#   - Short 5s preStop/30s grace (kind has no GCP NEG deprogramming latency)
#   - nginx ingressClassName (kind's ingress-nginx, not GCE)
#   - NetworkPolicy egress: adds MinIO + Mailpit ports, keeps only port 6379 for Redis
#   - MinIO localhost-shim sidecar (native sidecar, socat pod :9000 → minio:9000)
#   - DB_DRIVER=pg in ConfigMap (node-postgres adapter, same as GCP with Cloud SQL)
#
# Render with: kubectl kustomize infra/k8s/overlays/local
# Apply with:  bash infra/k8s/local-run/run.sh [up|deploy]
namespace: devstash

resources:
  - ../../base        # Deployment, Service, Ingress, HPA, ConfigMap, PDB, NetworkPolicy
  - namespace.yaml    # devstash namespace with PSA restricted (enforce-version: v1.31)
  - secret.local.yaml # throwaway local credentials (mirrors GCP ExternalSecret key set)
  # migrate-job-local.yaml is intentionally NOT listed here — a Job's pod template
  # is immutable on re-apply. run.sh applies it separately (delete-then-apply) and
  # waits for completion before rolling out the web Deployment, mirroring the GCP CI gate.

# Local image: built by `docker build -t devstash:local` and loaded into kind
# with `kind load docker-image devstash:local`. IfNotPresent so kind never tries
# to pull a registry image that doesn't exist.
images:
  - name: devstash
    newName: devstash
    newTag: local

patches:
  # ── App pod: single replica + MinIO localhost-shim sidecar ──────────────────
  # base securityContext / resources / probes / envFrom remain unchanged.
  - path: patches/app-local.yaml

  # ── Service: ClusterIP → NodePort (kind-config maps 30080 → host :8080) ─────
  - path: patches/service-nodeport.yaml

  # ── NetworkPolicy: replace egress with local backing-service ports ───────────
  # Replaces the full egress list (NetworkPolicy lists have no strategic-merge key).
  # Adds MinIO :9000, Mailpit :1025/:8025; uses Redis :6379 only (no TLS locally).
  - path: patches/networkpolicy-local.yaml

  # ── HPA: scale 1-3 locally (2-10 on GCP) ───────────────────────────────────
  - target:
      kind: HorizontalPodAutoscaler
      name: devstash-web
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # ── Ingress: nginx class for kind's ingress-nginx controller ─────────────────
  # GCP overlay uses `kubernetes.io/ingress.class: gce` annotation instead.
  # The app is also reachable directly via NodePort (:8080); Ingress is rendered
  # for parity with the GCP overlay (same base resource, different controller).
  - target:
      kind: Ingress
      name: devstash-web
    patch: |
      - op: add
        path: /spec/ingressClassName
        value: nginx

configMapGenerator:
  - name: devstash-config
    behavior: merge
    literals:
      # DB_DRIVER=pg: node-postgres adapter for in-cluster Postgres over plain TCP.
      # Mirrors the GCP overlay (Cloud SQL also uses node-postgres via DB_DRIVER=pg).
      - DB_DRIVER=pg
      # Non-secret sender address. Belongs in ConfigMap (not Secret) per K8s design:
      # ConfigMaps are for non-confidential data; Secrets are for credentials only.
      - EMAIL_FROM=DevStash <dev@devstash.local>
      # GCS via S3 interop (MinIO locally) — non-secret config; only the HMAC-style
      # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY pair stays in secret.local.yaml.
      # AWS_ENDPOINT_URL_S3 = localhost:9000 so presigned URLs are valid for BOTH the
      # browser (kind maps host :9000 → MinIO) AND the server (minio-localhost-shim
      # socat sidecar forwards pod's :9000 → minio:9000). SigV4 signs the Host header
      # so host must be byte-identical on both sides.
      - AWS_ENDPOINT_URL_S3=http://localhost:9000
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET=devstash-uploads
      # Mailpit SMTP — non-secret config (GCP uses Resend instead, no SMTP_HOST there).
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      # NEXTAUTH_URL: overridden to the local URL. The Secret also sets this key
      # (Secret wins over ConfigMap on duplicates in envFrom order), so either path
      # works — the ConfigMap value is the safe fallback if the Secret key is removed.
      - NEXTAUTH_URL=http://localhost:8080
