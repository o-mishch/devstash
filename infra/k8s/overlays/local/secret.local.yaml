# LOCAL-ONLY throwaway secret — all values are fake / dev-only.
# Keys exactly mirror external-secrets.yaml so the local overlay and the GCP
# overlay consume an identically-shaped Secret. Never commit real credentials here.
#
# Key groups (same order as external-secrets.yaml):
#   1. GCS/S3 (MinIO shim locally)
#   2. Redis (plain TCP locally, TLS on GCP)
#   3. Database (in-cluster Postgres locally, Cloud SQL on GCP)
#   4. Auth, email, Stripe, AI
#
# NEXTAUTH_URL in the Secret overrides the ConfigMap's placeholder because envFrom
# processes ConfigMap first then Secret — later entries win on duplicate keys.
apiVersion: v1
kind: Secret
metadata:
  name: devstash-secrets
type: Opaque
stringData:
  # ── GCS via S3 interop (MinIO locally) ──────────────────────────────────────
  # AWS_ENDPOINT_URL_S3, AWS_REGION, AWS_S3_BUCKET are non-secret config — they live in
  # the devstash-config ConfigMap (kustomization.yaml configMapGenerator), not here.
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
  # Path-style addressing (MinIO requires it) is derived from AWS_ENDPOINT_URL_S3
  # being set — no separate flag. GCP's endpoint is GCS; Vercel sets no endpoint and
  # stays virtual-host. See src/lib/storage/s3-local.ts.

  # ── Redis (TLS locally + on GCP; both rediss:// on port 6379) ───────────────
  # REDIS_URL takes precedence over any Upstash REST vars. Local mirrors GCP Memorystore
  # for Valkey's in-transit TLS (SERVER_AUTHENTICATION): rediss:// on 6379, verified
  # against a self-signed CA. src/lib/infra/redis-tcp.ts builds the custom-CA TLS socket
  # whenever REDIS_CA_CERT is set (it gates on the cert, not the URL scheme) — the same
  # code path in both envs. Use rediss:// here so the URL scheme matches the TLS it dials.
  REDIS_URL: "rediss://redis:6379"
  # REDIS_CA_CERT is NOT set here: the CA is generated at runtime by run.sh
  # (ensure_valkey_tls) into the valkey-tls Secret, and the app reads it from there via a
  # secretKeyRef in overlays/local/patches/app-local.yaml. On GCP the same env var is a
  # key in the ExternalSecret-synced devstash-secrets. The IAM token path (REDIS_IAM_AUTH)
  # stays unset locally — Valkey OSS has no GCP IAM, so local is no-auth over TLS.

  # ── Database (in-cluster Postgres; GCP uses Cloud SQL private IP) ────────────
  # DB_DRIVER=pg (node-postgres adapter, src/lib/infra/db-local.ts — same adapter
  # used on GCP with Cloud SQL) is non-secret and set via the devstash-config
  # ConfigMap (kustomization.yaml) only — this Secret holds credentials only.
  DATABASE_URL: "postgresql://devstash:devstash@postgres:5432/devstash?sslmode=disable"
  DIRECT_URL:   "postgresql://devstash:devstash@postgres:5432/devstash?sslmode=disable"
  # DATABASE_CA_CERT intentionally absent — no TLS locally.

  # ── Auth ─────────────────────────────────────────────────────────────────────
  AUTH_SECRET: "local-dev-auth-secret-not-for-production"
  AUTH_GITHUB_ID: ""
  AUTH_GITHUB_SECRET: ""
  AUTH_GOOGLE_ID: ""
  AUTH_GOOGLE_SECRET: ""

  # ── Email (Mailpit SMTP locally; GCP uses Resend) ────────────────────────────
  # SMTP_HOST/SMTP_PORT are non-secret config — they live in the devstash-config
  # ConfigMap (kustomization.yaml configMapGenerator), not here.
  # Do NOT set DISABLE_EMAIL_VERIFICATION — mail should flow into Mailpit.
  RESEND_API_KEY: ""
  # EMAIL_FROM intentionally absent: non-secret sender address belongs in the ConfigMap,
  # not the Secret. See infra/k8s/overlays/local/kustomization.yaml configMapGenerator.

  # ── Stripe (stays SaaS — two local paths, see infra/docs/07-local-run.md) ───
  # A) OFFLINE default: only STRIPE_WEBHOOK_SECRET matters. Grant Pro by posting a
  #    signed fake event with infra/run/local/stripe-fake-webhook.ts.
  # B) Real test-mode: fill in sk_test_/pk_test_ keys + price IDs from Stripe
  #    dashboard; forward webhooks with `stripe listen`.
  STRIPE_SECRET_KEY: "sk_test_REPLACE_ME"
  STRIPE_PUBLISHABLE_KEY: "pk_test_REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_local_test"
  STRIPE_PRICE_ID_MONTHLY: "price_REPLACE_ME_MONTHLY"
  STRIPE_PRICE_ID_YEARLY: "price_REPLACE_ME_YEARLY"

  # ── AI ───────────────────────────────────────────────────────────────────────
  OPENAI_API_KEY: ""

  # ── App ──────────────────────────────────────────────────────────────────────
  # Overrides the ConfigMap's GCP placeholder — Secret wins on duplicate keys.
  NEXTAUTH_URL: "http://localhost:8080"
  SKIP_ENV_VALIDATION: "true"
  LOG_LEVEL: "info"
