# ---------------------------------------------------------------------------
# TEMPLATE ONLY — do NOT commit a real Secret with values filled in.
#
# In production you would NOT apply a plaintext Secret like this. Instead:
#   - Sync from a manager (External Secrets Operator → Google Secret Manager), or
#   - Encrypt at rest in git (Sealed Secrets / SOPS), or
#   - Mount via CSI (Secrets Store CSI driver + Workload Identity).
# The Terraform layer (03) provisions Secret Manager + Workload Identity so pods
# read secrets by IAM identity rather than holding static credentials.
#
# This file documents the KEYS the app expects (mirrors .env.example). Copy to
# secret.yaml, fill values, and keep secret.yaml out of git.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: devstash-secrets
  labels:
    app.kubernetes.io/name: devstash
type: Opaque
stringData:
  # Database — managed Cloud SQL for PostgreSQL (Terraform: modules/cloudsql). The
  # app uses the PRIVATE IP over the VPC peering; ssl_mode=ENCRYPTED_ONLY on the
  # instance + TLS verified in-app via DATABASE_CA_CERT. Both URLs are the same
  # (no separate pooler). Built by Terraform — placeholders shown here.
  DATABASE_URL: "postgresql://devstash_app:REPLACE@PRIVATE_IP:5432/devstash?sslmode=require"
  DIRECT_URL:   "postgresql://devstash_app:REPLACE@PRIVATE_IP:5432/devstash?sslmode=require"
  # Server CA for the Cloud SQL instance (PEM). node-postgres verifies the server
  # TLS chain against this cert (src/lib/infra/db-local.ts: resolveDbSsl). Provided
  # by Terraform (modules/cloudsql: server_ca_cert output → Secret Manager).
  DATABASE_CA_CERT: "REPLACE_pem_from_tofu_output_or_gcloud_sql_instances_describe"
  # NextAuth
  AUTH_SECRET: "REPLACE_openssl_rand_base64_32"
  # AUTH_GITHUB_ID / AUTH_GOOGLE_ID intentionally absent: OAuth CLIENT IDs are non-secret
  # (sent in every auth redirect, visible client-side) and live in the devstash-config
  # ConfigMap (settings.yaml), not the Secret — same RBAC-blast-radius reasoning as
  # EMAIL_FROM below. Only the client SECRETS stay here.
  AUTH_GITHUB_SECRET: ""
  AUTH_GOOGLE_SECRET: ""
  # Email — Resend (stays SaaS)
  RESEND_API_KEY: ""
  # EMAIL_FROM is intentionally absent: it is a non-secret sender address stored in the
  # devstash-config ConfigMap (infra/k8s/overlays/gcp/kustomization.yaml), not in the Secret.
  # Per the Kubernetes design contract, ConfigMaps are for non-confidential data; Secrets are
  # for credentials. Mixing non-sensitive values into a Secret widens RBAC blast radius.
  # Redis — managed Memorystore via native ioredis (AUTH on + in-transit TLS).
  # REDIS_URL (rediss://) takes precedence over the Upstash REST vars; REDIS_CA_CERT
  # is the server CA PEM ioredis verifies against. Built by Terraform.
  # Port 6378 is Memorystore for Redis's fixed TLS port in SERVER_AUTHENTICATION
  # mode. Do not use the conventional self-hosted TLS port 6380.
  REDIS_URL: "rediss://default:REPLACE_AUTH@PRIVATE_IP:6378"
  REDIS_CA_CERT: "REPLACE_server_ca_pem"
  # Storage — GCS via S3-interop. The app uses the AWS S3 SDK unchanged; only the
  # endpoint and credentials change. HMAC keys are minted by Terraform (modules/iam:
  # google_storage_hmac_key → Secret Manager) and are the only genuinely sensitive
  # part — AWS_ENDPOINT_URL_S3 ("https://storage.googleapis.com"), AWS_REGION ("auto",
  # GCS ignores it), and AWS_S3_BUCKET are non-secret and live in the devstash-config
  # ConfigMap instead (infra/k8s/overlays/gcp/kustomization.yaml).
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  # Stripe (stays SaaS)
  # STRIPE_PUBLISHABLE_KEY (public pk_...) + STRIPE_PRICE_ID_MONTHLY / _YEARLY (non-sensitive
  # identifiers) intentionally absent: non-secret → devstash-config ConfigMap (settings.yaml),
  # not the Secret. Only the secret key + webhook secret stay here.
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  # AI
  OPENAI_API_KEY: ""
