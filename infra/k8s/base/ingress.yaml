apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devstash-web
  labels:
    app.kubernetes.io/name: devstash
    app.kubernetes.io/component: web
  # This base Ingress is consumed ONLY by the local (kind) overlay, which patches on the
  # nginx ingressClassName. The gcp overlay DELETES this Ingress ($patch: delete) and serves
  # the app through the Gateway API instead (overlays/gcp/gateway.yaml + httproute.yaml) —
  # so no GCE Ingress / classic Application Load Balancer is ever created on GKE.
spec:
  rules:
    # Placeholder replaced per-overlay via kustomize replacement:
    #   GCP overlay — data.domain from settings.yaml → "gke.devstash.one"
    #   local overlay — left as-is; nginx routes by path, host header is ignored
    # DO NOT change this to "gke.devstash.one" directly — the replacement in
    # overlays/gcp/kustomization.yaml is the authoritative source. Editing the
    # base host would break the local overlay and is overwritten by CI anyway.
    - host: gke.devstash.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devstash-web
                port:
                  number: 80
