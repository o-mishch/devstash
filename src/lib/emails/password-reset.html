<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your DevStash password</title>
  </head>
  <body style="margin:0;padding:0;background:#f9fafb;font-family:sans-serif">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px">
      <tr>
        <td align="center">
          <table width="480" cellpadding="0" cellspacing="0"
                 style="background:#fff;border-radius:8px;border:1px solid #e5e7eb;padding:40px 32px">
            <tr>
              <td>
                <h2 style="margin:0 0 8px;font-size:20px;color:#111827">Reset your password</h2>
                <p style="margin:0 0 24px;color:#6b7280;font-size:14px;line-height:1.6">
                  Click the button below to reset your DevStash password.
                  This link expires in <strong>1 hour</strong>.
                </p>
                <a href="{{RESET_URL}}"
                   style="display:inline-block;background:#3b82f6;color:#fff;
                          text-decoration:none;padding:12px 24px;border-radius:6px;
                          font-size:14px;font-weight:600">
                  Reset password
                </a>
                <p style="margin:32px 0 0;color:#9ca3af;font-size:12px;line-height:1.5">
                  If you didn't request a password reset, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
