<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevStash — API health</title>
    <style>
      :root { color-scheme: dark light; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #0b0f17;
        color: #e6edf3;
      }
      main { text-align: center; padding: 2rem; }
      h1 { font-size: 1rem; font-weight: 500; opacity: 0.6; margin: 0 0 1.5rem; }
      .dot { display: inline-block; width: 0.6rem; height: 0.6rem; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
      .ok { background: #3fb950; }
      .bad { background: #f85149; }
      .pending { background: #d29922; }
      .status { font-size: 1.5rem; font-weight: 600; }
      pre {
        margin-top: 1.5rem; padding: 1rem; text-align: left;
        background: #161b22; border: 1px solid #21262d; border-radius: 8px;
        max-width: min(90vw, 520px); overflow-x: auto; font-size: 0.85rem;
      }
      .target { margin-top: 1rem; font-size: 0.8rem; opacity: 0.5; }
    </style>
  </head>
  <body>
    <main>
      <h1>DevStash API health check</h1>
      <div class="status"><span id="dot" class="dot pending"></span><span id="label">checking…</span></div>
      <pre id="output">—</pre>
      <div class="target" id="target"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
